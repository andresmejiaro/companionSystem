<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Unlock settings</title>
<style>
  body { max-width: 30rem; margin: 4rem auto; padding: 0 1rem; font: 17px/1.45 system-ui, sans-serif; }
  input, button { display: block; box-sizing: border-box; width: 100%; margin-top: .6rem; padding: .7rem; font: inherit; }
  .error { color: #9b1c1c; }
</style>
<main>
  <p><a href="/directory">← Companion directory</a></p>
  <h1>Unlock settings</h1>
  <p>Enter a current code from your administrator authenticator app. This unlock lasts 15 minutes and is stored only in a secure browser cookie.</p>
  <!-- ERROR -->
  <form method="post" action="/settings/unlock">
    <label>Authenticator code <input name="totp_code" required inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]{6,8}" autofocus></label>
    <button type="submit">Unlock settings</button>
  </form>
</main>
