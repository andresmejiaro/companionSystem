<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>New companion</title>
<style>
  body { max-width: 42rem; margin: 2rem auto; padding: 0 1rem;
         font: 17px/1.45 system-ui, sans-serif; color: #17221b; }
  label, input, textarea { display: block; width: 100%; box-sizing: border-box; }
  label { margin-top: 1rem; font-weight: 600; } input, textarea { margin-top: .3rem; padding: .65rem; font: inherit; }
  button { margin-top: 1.25rem; padding: .7rem 1rem; font: inherit; }
  #result { white-space: pre-wrap; } .error { color: #9b1c1c; }
</style>
<main>
  <p><a href="/directory">← Companion directory</a></p>
  <h1>New companion</h1>
  <p>Create a companion using the current code from your administrator authenticator app. No bearer credential is stored in this page.</p>
  <form id="new-companion">
    <label>Companion ID <input name="id" required pattern="[a-z0-9_-]{1,64}" autocomplete="off" placeholder="e.g. travel_planner"></label>
    <label>Display name <input name="display_name" required placeholder="e.g. Travel Planner"></label>
    <label>Description <textarea name="description" rows="3" maxlength="200" placeholder="What this companion helps with (up to 200 characters)"></textarea></label>
    <label>Signature <input name="signature" maxlength="5" placeholder="e.g. 🧭"></label>
    <label>Identity prompt <textarea name="base_prompt" rows="5" placeholder="Stable identity and operating mode"></textarea></label>
    <label>Role prompt <textarea name="role_prompt" rows="5" placeholder="Current role or lane"></textarea></label>
    <input type="hidden" name="allowed_tools" value="">
    <label>Authenticator code <input name="totp_code" required inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]{6,8}" placeholder="6-digit code"></label>
    <button type="submit">Create companion</button>
  </form>
  <p id="result" role="status"></p>
</main>
<script>
const form = document.querySelector('#new-companion');
const result = document.querySelector('#result');
const templates = {
  system_notifier: {
    id: 'system_notifier',
    display_name: 'System Notifier',
    description: 'Sends authorized operational notices to companion inboxes.',
    signature: '📣',
    base_prompt: `You are a non-conversational system identity used only as the sender of operational notices to companion inboxes. You do not hold project knowledge, user memories, documents, or structured records. You do not offer advice, manage schemas, or act as a normal chat companion.`,
    role_prompt: `Your sole permitted operation is send_message. Messages must be factual system notices produced by an authorized workflow. Do not initiate conversation, answer as a personal companion, store information, call memory or record tools, or perform migrations. If opened interactively, state briefly that this identity is only an automated notification sender.`,
    allowed_tools: 'send_message',
  },
};
const requestedTemplate = new URLSearchParams(location.search).get('template');
if (templates[requestedTemplate]) {
  for (const [name, value] of Object.entries(templates[requestedTemplate])) {
    form.elements[name].value = value;
  }
  result.textContent = 'Store Steward template loaded. Review it, enter the current authenticator code, and create.';
}
form.addEventListener('submit', async event => {
  event.preventDefault();
  result.className = '';
  result.textContent = 'Creating companion…';
  const data = Object.fromEntries(new FormData(form));
  data.id = data.id.trim().toLowerCase();
  data.allowed_tools = data.allowed_tools ? data.allowed_tools.split(',') : [];
  try {
    const response = await fetch('/profiles/totp-create', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data),
    });
    const body = await response.json().catch(() => ({}));
    if (!response.ok) throw new Error(body.detail || `Request failed (${response.status})`);
    result.textContent = `Created ${body.display_name} (${body.id}).`;
    form.reset();
  } catch (error) {
    result.className = 'error';
    result.textContent = error.message;
  }
});
</script>
